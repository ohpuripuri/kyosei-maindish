<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>強制メインディッシュ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1208;
    --surface: #2a1e0e;
    --accent: #e8892a;
    --accent2: #f5c842;
    --text: #f5ede0;
    --text-muted: #a08060;
    --card: #231708;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Zen Maru Gothic', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }

  /* 背景の炎っぽいグラデーション */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(232,137,42,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 20% 80%, rgba(245,200,66,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    text-align: center;
  }

  .header {
    margin-bottom: 3rem;
  }

  .header .eyebrow {
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
    opacity: 0.8;
  }

  .header h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(1.6rem, 6vw, 2.2rem);
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
  }

  .header h1 span {
    color: var(--accent2);
  }

  .header .description {
    margin-top: 0.8rem;
    font-size: 0.85rem;
    color: var(--text-muted);
    line-height: 1.7;
  }

  /* 結果カード */
  .result-card {
    background: var(--card);
    border: 1px solid rgba(232,137,42,0.25);
    border-radius: 16px;
    padding: 1.2rem 2rem 2rem;
    margin-bottom: 2rem;
    min-height: 160px;
    display: grid;
    grid-template-rows: auto 1fr;
    position: relative;
    overflow: hidden;
  }

  .result-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 120%, rgba(232,137,42,0.12), transparent 70%);
    pointer-events: none;
  }

  .result-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  .result-dish {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(2rem, 8vw, 3rem);
    font-weight: 700;
    color: var(--accent2);
    line-height: 1.2;
    transition: all 0.3s ease;
    min-height: 1.4em;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .result-dish.placeholder {
    font-size: 0.9rem;
    font-weight: 400;
    color: var(--text-muted);
    font-family: 'Zen Maru Gothic', sans-serif;
  }

  .result-dish.decided {
    animation: fadein 0.8s ease forwards;
  }

  @keyframes fadein {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .note {
    display: none;
    margin-top: 0.9rem;
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    opacity: 0.6;
    font-style: italic;
  }

  /* ボタン */
  .btn-decide {
    width: 100%;
    padding: 1.2rem 2rem;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--bg);
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.08em;
    box-shadow: 0 4px 24px rgba(232,137,42,0.35);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-decide:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(232,137,42,0.5);
  }

  .btn-decide:active {
    transform: translateY(0);
    box-shadow: 0 2px 12px rgba(232,137,42,0.3);
  }

  .btn-decide:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .btn-decide::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    transform: translate(-50%,-50%);
    transition: width 0.4s ease, height 0.4s ease, opacity 0.4s ease;
    opacity: 0;
  }

  .btn-decide:active::after {
    width: 300px; height: 300px; opacity: 1;
  }


</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>強制<br><span>メインディッシュ</span></h1>
    <p class="description">手作りでも外食でも買ってきても良い。<br>とにかくこれを食べるのです。</p>
  </div>

  <div class="result-card">
    <div class="result-label" id="resultLabel" style="visibility:hidden;">Just Eat This</div>
    <div class="result-dish placeholder" id="resultDish">ボタンを押してください</div>
  </div>

  <button class="btn-decide" id="btnDecide" onclick="decide()">
    ✦ 今日のメインを決める ✦
  </button>
  <p class="note" id="note">— およそ 3 時間後に、また引けます —</p>


</div>

<script>
  let menu = [];

  async function loadMenu() {
    try {
      const res = await fetch('./menu.json');
      menu = await res.json();
    } catch (e) {
      console.error('menu.json の読み込みに失敗しました', e);
    }
  }

  const INTERVAL_MS = 3 * 60 * 60 * 1000; // 3時間

  function setUsedState(dish) {
    const btn = document.getElementById('btnDecide');
    btn.disabled = true;
    btn.textContent = '✦ 次の食事でお会いしましょう ✦';
    btn.style.background = 'linear-gradient(135deg, #555 0%, #777 100%)';
    btn.style.boxShadow = 'none';
    btn.style.color = '#aaa';

    document.getElementById('note').style.display = 'block';
    document.getElementById('resultLabel').style.visibility = 'visible';

    const dishEl = document.getElementById('resultDish');
    dishEl.textContent = dish;
    dishEl.className = 'result-dish decided';
  }

  // 起動時チェック
  window.addEventListener('DOMContentLoaded', async () => {
    await loadMenu();
    const saved = localStorage.getItem('kondate_used');
    if (saved) {
      const { timestamp, dish } = JSON.parse(saved);
      const elapsed = Date.now() - timestamp;
      if (elapsed < INTERVAL_MS) {
        setUsedState(dish);
      } else {
        localStorage.removeItem('kondate_used');
      }
    }
  });

  function decide() {
    const btn = document.getElementById('btnDecide');
    const dishEl = document.getElementById('resultDish');

    dishEl.style.transition = 'opacity 0.25s ease';
    dishEl.style.opacity = '0';
    btn.disabled = true;

    setTimeout(() => {
      const final = menu[Math.floor(Math.random() * menu.length)];
      dishEl.textContent = final;
      dishEl.className = 'result-dish decided';

      localStorage.setItem('kondate_used', JSON.stringify({
        timestamp: Date.now(),
        dish: final,
      }));
      setUsedState(final);
    }, 280);
  }
</script>

</body>
</html>
